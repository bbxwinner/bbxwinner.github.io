{{- $lang := .Site.Language.Lang | default "en" -}}
<!doctype html>
<html lang="{{ $lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relURL }}">
    <title>{{ .Site.Title }}</title>
    <style>
      body { margin:0; font-family:Georgia,serif; background:#fff; color:#111; line-height:1.7; }
      .wrap { max-width:760px; margin:2.5rem auto; padding:0 1rem; }
      a { color:#0a58ca; }
      .post-list { list-style:none; padding:0; }
      .post-list li { margin:0 0 1rem; }
      h1 { margin-bottom:1.5rem; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>{{ .Site.Title }}</h1>
      <ul class="post-list">
        {{ range where .Site.RegularPages "Type" "posts" }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
        {{ end }}
      </ul>
    </main>
  </body>
</html>
